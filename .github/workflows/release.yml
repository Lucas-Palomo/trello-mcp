name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE_TYPE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          BIN_NAME="trello-mcp"
          if [ "$GOOS" = "windows" ]; then
            BIN_NAME="trello-mcp.exe"
          fi

          STAGE_DIR="release/${GOOS}-${GOARCH}"
          mkdir -p "$STAGE_DIR"
          go build -o "$STAGE_DIR/$BIN_NAME" .

          ASSET_BASE="trello-mcp_${VERSION}_${GOOS}_${GOARCH}"
          if [ "$ARCHIVE_TYPE" = "zip" ]; then
            cd "$STAGE_DIR"
            zip -q "../../${ASSET_BASE}.zip" "$BIN_NAME"
            cd -
          else
            tar -C "$STAGE_DIR" -czf "${ASSET_BASE}.tar.gz" "$BIN_NAME"
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            trello-mcp_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
            trello-mcp_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.zip
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum trello-mcp_* > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/trello-mcp_*
            release-assets/checksums.txt
